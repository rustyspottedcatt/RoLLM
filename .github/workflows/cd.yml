name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wally dependencies
        run: wally install

      # ── Validate before publishing ────────────────────────────────────────────
      - name: Check formatting
        run: stylua --check src examples tests

      - name: Lint
        run: selene src examples tests

      - name: Build sourcemap
        run: rojo sourcemap default.project.json --output sourcemap.json

      - name: Build place
        run: rojo build default.project.json --output RoLLM.rbxl

      - name: Transform source for Lune (darklua)
        run: darklua process --config .darklua.json src dist

      - name: Run unit tests (Lune)
        run: lune run tests/run_lune.luau

      # ── Extract version and changelog section ─────────────────────────────────
      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the block between the current tag heading and the next heading
          NOTES=$(awk "/^## \[?${TAG#v}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Use a heredoc-style delimiter to safely pass multi-line output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RoLLM ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: RoLLM.rbxl
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

      # ── Wally publish ─────────────────────────────────────────────────────────
      - name: Publish to Wally
        env:
          WALLY_AUTH_TOKEN: ${{ secrets.WALLY_AUTH_TOKEN }}
        run: |
          wally login --token "$WALLY_AUTH_TOKEN"
          wally publish
